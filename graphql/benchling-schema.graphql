type Location {
  id: ID!
  name: String!
  barcode: String
  schema: Schema
  fields: [CustomField!]!
  parentStorageId: ID
  breadcrumbs: [LocationBreadcrumb!]!
  creator: Creator!
  createdAt: DateTime!
  modifiedAt: DateTime!
  webURL: String!
}

type LocationBreadcrumb {
  id: ID!
  type: String!
  name: String!
}

type LocationConnection {
  edges: [LocationEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type LocationEdge {
  cursor: String!
  node: Location!
}

type Container {
  id: ID!
  name: String
  barcode: String
  quantity: ContainerQuantity
  status: ContainerStatus!
  schema: Schema
  fields: [CustomField!]!
  checkoutStatus: CheckoutStatus!
  checkedOutAt: DateTime
  checkedOutTo: UserSummary
  contents: [ContainerContent!]!
  parentStorageId: ID
  parentStorageType: String
  position: String
  projectId: ID
  creator: Creator!
  createdAt: DateTime!
  modifiedAt: DateTime!
