"""
Benchling GraphQL Schema
Derived from the Benchling REST API v2 for life sciences R&D cloud platform.
Covers notebook entries, sequences, molecules, assay results, registration,
inventory management, plates, workflows, and collaboration.
"""

# ─────────────────────────────────────────────
# Scalars
# ─────────────────────────────────────────────

scalar DateTime
scalar JSON
scalar Upload

# ─────────────────────────────────────────────
# Enums
# ─────────────────────────────────────────────

enum ArchiveReason {
  MADE_IN_ERROR
  RETIRED
  EXPENDED
  SHIPPED
  CONTAMINATED
  EXPIRED
  MISSING
  OTHER
}

enum NamingStrategy {
  NEW_IDS
  IDS_FROM_NAMES
  DELETE_NAMES
  SET_FROM_NAME_PARTS
  REPLACE_NAMES_FROM_PARTS
}

enum EntityType {
  DNA_SEQUENCE
  RNA_SEQUENCE
  AA_SEQUENCE
  CUSTOM_ENTITY
  MOLECULE
  MIXTURE
}

enum SequenceType {
  LINEAR
  CIRCULAR
}

enum StrandType {
  SINGLE
  DOUBLE
}

enum NucleotideType {
  DNA
  RNA
}

enum ReviewStatus {
  APPROVED
  PENDING
  REJECTED
}

enum WorkflowTaskStatus {
  UNSCHEDULED
  SCHEDULED
  IN_PROGRESS
  COMPLETED
  CANCELLED
}

enum ContainerStatus {
  AVAILABLE
  RESERVED
  IN_USE
  DISCARDED
  PENDING_DISPOSAL
}

enum AssayRunStatus {
  ACTIVE
  RETIRED
}

enum NotebookEntryStatus {
  DRAFT
  LOCKED
  REVIEW_REQUESTED
  APPROVED
}

enum SortDirection {
  ASC
  DESC
}

enum CheckoutStatus {
  CHECKED_OUT
  AVAILABLE
}

enum MixtureUnit {
  uL
  mL
  L
  g
  kg
  mg
  ug
  ng
  pg
}

# ─────────────────────────────────────────────
# Common / Shared Types
# ─────────────────────────────────────────────

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type UserSummary {
  id: ID!
  handle: String!
  name: String!
  email: String!
}

type TeamSummary {
  id: ID!
  name: String!
}

type OrganizationSummary {
  id: ID!
  name: String!
  handle: String!
}

type FieldValue {
  displayValue: String
  value: JSON
  isMulti: Boolean!
}

type CustomField {
  fieldDefinitionId: ID!
  name: String!
  value: FieldValue
}

type Folder {
  id: ID!
  name: String!
  parentFolderId: ID
  projectId: ID
}

type Project {
  id: ID!
  name: String!
  owner: UserSummary
  createdAt: DateTime!
  modifiedAt: DateTime!
  isArchived: Boolean!
  archiveReason: ArchiveReason
}

type Schema {
  id: ID!
  name: String!
  fieldDefinitions: [FieldDefinition!]!
}

type FieldDefinition {
  id: ID!
  name: String!
  type: String!
  isRequired: Boolean!
  isMulti: Boolean!
}

type Creator {
  id: ID!
  handle: String!
  name: String!
}

type AuditLog {
  id: ID!
  entityId: ID!
  entityType: String!
  action: String!
  performedAt: DateTime!
  performedBy: UserSummary!
  changes: JSON
}

# ─────────────────────────────────────────────
# Registry / Entity Types
# ─────────────────────────────────────────────

type RegistrySchema {
  id: ID!
  name: String!
  prefix: String!
  fieldDefinitions: [FieldDefinition!]!
}

type EntityRegistration {
  registryId: ID!
  entityRegistryId: String!
  namingStrategy: NamingStrategy!
  folderId: ID
}

# ─────────────────────────────────────────────
# DNA / RNA / AA Sequences
# ─────────────────────────────────────────────

type DNASequence {
  id: ID!
  name: String!
  bases: String!
  length: Int!
  isCircular: Boolean!
  schema: Schema
  registrationOrigin: EntityRegistration
  customFields: [CustomField!]!
  aliases: [String!]!
  annotations: [SequenceAnnotation!]!
  primers: [Primer!]!
  translations: [Translation!]!
  creator: Creator!
  folderId: ID
  projectId: ID
  createdAt: DateTime!
  modifiedAt: DateTime!
  webURL: String!
  archiveReason: ArchiveReason
}

type DNASequenceConnection {
  edges: [DNASequenceEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type DNASequenceEdge {
  cursor: String!
  node: DNASequence!
}

type RNASequence {
  id: ID!
  name: String!
  bases: String!
  length: Int!
  isCircular: Boolean!
  schema: Schema
  customFields: [CustomField!]!
  aliases: [String!]!
  annotations: [SequenceAnnotation!]!
  creator: Creator!
  folderId: ID
  createdAt: DateTime!
  modifiedAt: DateTime!
  webURL: String!
}

type RNASequenceConnection {
  edges: [RNASequenceEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type RNASequenceEdge {
  cursor: String!
  node: RNASequence!
}

type AASequence {
  id: ID!
  name: String!
  aminoAcids: String!
  length: Int!
  schema: Schema
  customFields: [CustomField!]!
  aliases: [String!]!
  annotations: [SequenceAnnotation!]!
  creator: Creator!
  folderId: ID
  createdAt: DateTime!
  modifiedAt: DateTime!
  webURL: String!
}

type AASequenceConnection {
  edges: [AASequenceEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type AASequenceEdge {
  cursor: String!
  node: AASequence!
}

type SequenceAnnotation {
  id: ID!
  name: String!
  start: Int!
  end: Int!
  strand: Int
  color: String
  type: String
  notes: String
}

type Primer {
  id: ID!
  name: String!
  bases: String!
  bindPosition: Int!
  bindLength: Int!
  overhangLength: Int!
  strand: Int!
}

type Translation {
  id: ID!
  start: Int!
  end: Int!
  strand: Int!
  geneticCode: String!
  aminoAcids: String!
  regions: [TranslationRegion!]!
}

type TranslationRegion {
  start: Int!
  end: Int!
  aminoAcidStart: Int!
  aminoAcidEnd: Int!
}

# ─────────────────────────────────────────────
# Molecule & Mixture
# ─────────────────────────────────────────────

type Molecule {
  id: ID!
