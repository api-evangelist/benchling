  modifiedAt: DateTime!
  webURL: String!
}

type BoxGridDimensions {
  numRows: Int!
  numColumns: Int!
}

type BoxConnection {
  edges: [BoxEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type BoxEdge {
  cursor: String!
  node: Box!
}

