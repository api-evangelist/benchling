input PlateCreateInput {
  schemaId: ID!
  barcode: String
  name: String
  parentStorageId: ID
  fields: JSON
}

input WorkflowTaskCreateInput {
  schemaId: ID!
  fields: JSON
  assigneeId: ID
  scheduledOn: String
}

input WorkflowTaskUpdateInput {
  status: WorkflowTaskStatus
  fields: JSON
  outputFields: JSON
  assigneeId: ID
  scheduledOn: String
}

input LocationCreateInput {
  name: String!
  schemaId: ID
  barcode: String
  parentStorageId: ID
  fields: JSON
}

input BatchCreateInput {
  entityId: ID!
  schemaId: ID
  fields: JSON
}

input SequenceAnnotationInput {
  name: String!
  start: Int!
  end: Int!
  strand: Int
  color: String
  type: String
  notes: String
}

input ArchiveInput {
  ids: [ID!]!
