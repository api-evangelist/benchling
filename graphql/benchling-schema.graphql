}

input UnarchiveInput {
  ids: [ID!]!
}

input RegisterEntitiesInput {
  entityIds: [ID!]!
  registryId: ID!
  namingStrategy: NamingStrategy!
}

input ContainerTransferInput {
  sourceContainerId: ID!
  destinationContainerId: ID!
  transferQuantity: ContainerQuantityInput!
  sourceConcentration: ContainerQuantityInput
  destinationConcentration: ContainerQuantityInput
}

# ─────────────────────────────────────────────
# Query Root
# ─────────────────────────────────────────────

type Query {
  # DNA Sequences
  dnaSequence(id: ID!): DNASequence
  dnaSequences(
    after: String
    first: Int
    schemaId: ID
    folderId: ID
    modifiedAt: String
    name: String
    nameIncludes: String
    registryId: ID
  ): DNASequenceConnection!

  # RNA Sequences
  rnaSequence(id: ID!): RNASequence
  rnaSequences(
    after: String
    first: Int
    schemaId: ID
    folderId: ID
    modifiedAt: String
    name: String
  ): RNASequenceConnection!

  # AA Sequences
  aaSequence(id: ID!): AASequence
  aaSequences(
    after: String
    first: Int
    schemaId: ID
    folderId: ID
    modifiedAt: String
    name: String
  ): AASequenceConnection!

  # Molecules
  molecule(id: ID!): Molecule
  molecules(
    after: String
    first: Int
    schemaId: ID
    folderId: ID
    modifiedAt: String
    name: String
  ): MoleculeConnection!

  # Mixtures
  mixture(id: ID!): Mixture
  mixtures(
    after: String
    first: Int
    schemaId: ID
    folderId: ID
  ): MixtureConnection!

  # Custom Entities
  customEntity(id: ID!): CustomEntity
  customEntities(
    after: String
    first: Int
    schemaId: ID
    folderId: ID
    modifiedAt: String
    name: String
  ): CustomEntityConnection!

  # Assay Runs
  assayRun(id: ID!): AssayRun
  assayRuns(
    after: String
    first: Int
    schemaId: ID
    projectId: ID
    minCreatedTime: DateTime
    maxCreatedTime: DateTime
  ): AssayRunConnection!

  # Assay Results
  assayResult(id: ID!): AssayResult
  assayResults(
    after: String
    first: Int
    schemaId: ID
    runId: ID
    entityId: ID
    minCreatedTime: DateTime
    maxCreatedTime: DateTime
  ): AssayResultConnection!

  # Notebook Entries
  entry(id: ID!): Entry
  entries(
    after: String
    first: Int
    schemaId: ID
    folderId: ID
    projectId: ID
    name: String
    modifiedAt: String
    reviewStatus: ReviewStatus
  ): EntryConnection!

  # Inventory
  container(id: ID!): Container
  containers(
    after: String
    first: Int
    schemaId: ID
    barcode: String
    parentStorageId: ID
    batchId: ID
  ): ContainerConnection!

  plate(id: ID!): Plate
  plates(
    after: String
    first: Int
    schemaId: ID
    barcode: String
    parentStorageId: ID
  ): PlateConnection!

  box(id: ID!): Box
  boxes(
    after: String
    first: Int
    schemaId: ID
    barcode: String
    parentStorageId: ID
  ): BoxConnection!

  location(id: ID!): Location
  locations(
    after: String
    first: Int
    schemaId: ID
    barcode: String
    name: String
  ): LocationConnection!

  # Batches
  batch(id: ID!): Batch
  batches(
    after: String
    first: Int
    schemaId: ID
    modifiedAt: String
    name: String
  ): BatchConnection!

  # Workflows
  workflowTask(id: ID!): WorkflowTask
  workflowTasks(
    after: String
    first: Int
    schemaId: ID
    assigneeId: ID
    status: WorkflowTaskStatus
    scheduledOn: String
  ): WorkflowTaskConnection!

  workflowTaskGroup(id: ID!): WorkflowTaskGroup
  workflowTaskGroups(
    after: String
    first: Int
    schemaId: ID
  ): WorkflowTaskGroupConnection!

  # Users & Teams
  user(id: ID!): User
  users(
    after: String
    first: Int
    name: String
    email: String
  ): UserConnection!

  team(id: ID!): Team
  teams(
    after: String
    first: Int
  ): TeamConnection!

  # Projects & Folders
  project(id: ID!): Project
  folder(id: ID!): Folder

  # Events
  events(
    after: String
    first: Int
    eventTypes: [String!]
    createdAt: String
  ): EventConnection!

  # Schemas
  assaySchema(id: ID!): AssaySchema
  entrySchema(id: ID!): EntrySchema
  registrySchema(id: ID!): RegistrySchema

  # Audit
  auditLogs(
    entityId: ID!
    entityType: String!
    after: String
    first: Int
  ): [AuditLog!]!

  # Async Tasks
  asyncTask(taskId: ID!): AsyncTask
}

# ─────────────────────────────────────────────
# Mutation Root
# ─────────────────────────────────────────────

type Mutation {
  # DNA Sequences
  createDNASequence(input: DNASequenceCreateInput!): DNASequence!
  updateDNASequence(id: ID!, input: DNASequenceUpdateInput!): DNASequence!
  archiveDNASequences(input: ArchiveInput!): AsyncTask!
  unarchiveDNASequences(input: UnarchiveInput!): [DNASequence!]!

  # RNA Sequences
  createRNASequence(input: RNASequenceCreateInput!): RNASequence!
  archiveRNASequences(input: ArchiveInput!): AsyncTask!

  # AA Sequences
  createAASequence(input: AASequenceCreateInput!): AASequence!
  archiveAASequences(input: ArchiveInput!): AsyncTask!

  # Molecules
  createMolecule(input: MoleculeCreateInput!): Molecule!
  archiveMolecules(input: ArchiveInput!): AsyncTask!

  # Custom Entities
  createCustomEntity(input: CustomEntityCreateInput!): CustomEntity!
  archiveCustomEntities(input: ArchiveInput!): AsyncTask!

  # Registry
  registerEntities(input: RegisterEntitiesInput!): AsyncTask!
  unregisterEntities(entityIds: [ID!]!): AsyncTask!

  # Assay Runs
  createAssayRun(input: AssayRunCreateInput!): AssayRun!
  updateAssayRun(id: ID!, input: AssayRunCreateInput!): AssayRun!
  archiveAssayRuns(input: ArchiveInput!): AsyncTask!

  # Assay Results
  createAssayResult(input: AssayResultCreateInput!): AssayResult!
  createAssayResults(inputs: [AssayResultCreateInput!]!): AsyncTask!
  archiveAssayResults(input: ArchiveInput!): AsyncTask!

  # Notebook Entries
  createEntry(input: EntryCreateInput!): Entry!
  updateEntry(id: ID!, name: String, folderId: ID, fields: JSON): Entry!
  archiveEntries(input: ArchiveInput!): AsyncTask!

  # Inventory
  createContainer(input: ContainerCreateInput!): Container!
  updateContainer(id: ID!, input: ContainerCreateInput!): Container!
  archiveContainers(input: ArchiveInput!): AsyncTask!
  transferLiquid(input: ContainerTransferInput!): AsyncTask!
  checkoutContainers(ids: [ID!]!, comment: String, assigneeId: ID): AsyncTask!
  checkinContainers(ids: [ID!]!, comment: String): AsyncTask!

  createPlate(input: PlateCreateInput!): Plate!
  archivePlates(input: ArchiveInput!): AsyncTask!

  createLocation(input: LocationCreateInput!): Location!
  archiveLocations(input: ArchiveInput!): AsyncTask!

  # Batches
  createBatch(input: BatchCreateInput!): Batch!
  archiveBatches(input: ArchiveInput!): AsyncTask!

  # Workflows
  createWorkflowTask(input: WorkflowTaskCreateInput!): WorkflowTask!
  updateWorkflowTask(id: ID!, input: WorkflowTaskUpdateInput!): WorkflowTask!
  archiveWorkflowTasks(input: ArchiveInput!): AsyncTask!

  # Users
  createUser(name: String!, email: String!, handle: String!): User!
  updateUser(id: ID!, name: String, email: String): User!
}
