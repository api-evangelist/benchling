# ─────────────────────────────────────────────
# Input Types
# ─────────────────────────────────────────────

input DNASequenceCreateInput {
  name: String!
  bases: String!
  isCircular: Boolean!
  schemaId: ID
  folderId: ID
  aliases: [String!]
  customFields: JSON
  annotations: [SequenceAnnotationInput!]
}

input DNASequenceUpdateInput {
  name: String
  bases: String
  isCircular: Boolean
  schemaId: ID
  folderId: ID
  aliases: [String!]
  customFields: JSON
  annotations: [SequenceAnnotationInput!]
}

input RNASequenceCreateInput {
  name: String!
  bases: String!
  isCircular: Boolean!
  schemaId: ID
  folderId: ID
  aliases: [String!]
  customFields: JSON
}

input AASequenceCreateInput {
  name: String!
  aminoAcids: String!
  schemaId: ID
  folderId: ID
  aliases: [String!]
  customFields: JSON
}

input MoleculeCreateInput {
  name: String!
  chemicalFormula: String
