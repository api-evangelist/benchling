  status: NotebookEntryStatus!
  reviewStatus: ReviewStatus
  assignedReviewers: [UserSummary!]!
  creator: Creator!
  folderId: ID
  projectId: ID
  createdAt: DateTime!
  modifiedAt: DateTime!
  webURL: String!
}

type EntryDay {
  date: String!
