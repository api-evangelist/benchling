}

type ContainerQuantity {
  value: Float!
  units: String!
}

type ContainerContent {
  batch: Batch
  concentration: ContainerQuantity
}

type ContainerConnection {
  edges: [ContainerEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type ContainerEdge {
  cursor: String!
