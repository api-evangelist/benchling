  schemaId: ID
  folderId: ID
  aliases: [String!]
  customFields: JSON
}

input CustomEntityCreateInput {
  name: String!
  schemaId: ID!
  folderId: ID
  aliases: [String!]
  customFields: JSON
}

input AssayRunCreateInput {
  schemaId: ID!
  name: String
  projectId: ID
  fields: JSON
}

input AssayResultCreateInput {
  schemaId: ID!
  projectId: ID
  runId: ID
  fields: JSON!
}

input EntryCreateInput {
  name: String!
  schemaId: ID
  folderId: ID
  customFields: JSON
  initialTables: JSON
  authorIds: [ID!]
}

input ContainerCreateInput {
  schemaId: ID
  barcode: String
  name: String
  parentStorageId: ID
  quantity: ContainerQuantityInput
  projectId: ID
  fields: JSON
}

input ContainerQuantityInput {
  value: Float!
