type EntryNoteLink {
  id: ID!
  type: String!
  name: String!
  url: String
  webURL: String
}

type EntryConnection {
  edges: [EntryEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type EntryEdge {
  cursor: String!
  node: Entry!
}

type EntrySchema {
  id: ID!
  name: String!
  dayNoteSchemas: [Schema!]!
  fieldDefinitions: [FieldDefinition!]!
}

