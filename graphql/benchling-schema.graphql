}

type PlateConnection {
  edges: [PlateEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type PlateEdge {
  cursor: String!
  node: Plate!
}

type Box {
  id: ID!
  name: String
  barcode: String
  schema: Schema
  fields: [CustomField!]!
  gridDimensions: BoxGridDimensions
