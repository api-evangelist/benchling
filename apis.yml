aid: benchling
name: Benchling
description: 'Benchling is a life sciences R&D cloud platform offering a comprehensive
  REST API for programmatically managing molecular biology entities, assay results
  and runs, electronic lab notebook entries, DNA/RNA/protein sequences, inventory,
  and experiment workflows. The API enables integrations with lab instruments, ERP
  systems, LIMS, and external databases, as well as bulk data ingest/export and event-driven
  automation via webhooks and AWS EventBridge. API access is available to Professional
  and Enterprise tenants and supports user API keys, OAuth 2.0 client credentials,
  and OIDC authentication.

  '
type: Index
