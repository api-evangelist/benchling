apis:
- name: Benchling REST API
  description: 'Tenant-scoped REST API (v2) for creating, reading, updating, and deleting
    Benchling entities including DNA sequences, proteins, RNA, molecules, assay results
    and runs, notebook entries, registry entities, inventory containers, batches,
    mixtures, workflow tasks, users, and teams. Supports paginated list endpoints,
    bulk ingest tasks, and batch write operations.

    '
