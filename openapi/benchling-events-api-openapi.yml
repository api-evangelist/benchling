          nullable: true
          readOnly: true
          type: string
        type:
          allOf:
          - $ref: '#/components/schemas/FieldType'
          readOnly: true
        value:
          description: 'For single link fields, use the id of the item you want to link (eg. "seq_jdf8BV24").

            For multi-link fields, use an array of ids of the items you want to link (eg. ["seq_jdf8BV24"])

            '
          nullable: true
          oneOf:
          - type: string
          - type: boolean
          - type: number
          - type: object
          - items:
              type: string
            type: array
      required:
      - value
      type: object
    EntryReviewProcess:
      properties:
        completionStatus:
          description: State of the Entry at the end of the Review Process
          enum:
          - APPROVED
          - COMPLETED
          - ACCEPTED
          - REVIEWED
          - WITNESSED
          - SELF_REVIEWED
          type: string
        id:
          description: ID of the Review Process
          type: string
        name:
          description: Name of the Review Process
          type: string
        stages:
          description: Array of Stages for the Review Process
          items:
            properties:
              actionLabel:
                description: Action reviewer is doing during the review
                enum:
                - APPROVE
                - COMPLETE
                - ACCEPT
                - REVIEW
                - WITNESS
                - SELF_REVIEW
                type: string
              id:
                description: ID of the Review Stage
                type: string
              name:
                description: Name of the Review Stage
                type: string
              reviewers:
                description: Reviewers for the Review Stage
                items:
                  allOf:
                  - $ref: '#/components/schemas/PartySummary'
                  - properties:
                      status:
                        description: Status of the Reviewer
                        enum:
                        - BLOCKED
                        - PENDING
                        - FINISHED
                        - REJECTED
                        type: string
                  type: object
                type: array
            type: object
          type: array
        type:
          description: Type of the Review Process
          enum:
          - SELF_REVIEW
          - SEQUENTIAL
          - PARALLEL
          type: string
      type: object
