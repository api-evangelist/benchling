            enum:
            - registration_table
            type: string
        type: object
    EventBase:
      properties:
        createdAt:
          format: date-time
          type: string
        deprecated:
          example: false
          type: boolean
        excludedProperties:
          description: 'These properties have been dropped from the payload due to size.

            '
          items:
            type: string
          type: array
        id:
          type: string
        schema:
          nullable: true
          properties:
            id:
              type: string
