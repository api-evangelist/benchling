name: Benchling Plans and Pricing
description: Benchling offers tiered pricing for life sciences R&D teams, ranging from a free academic plan to custom enterprise agreements. API access is included with Professional and Enterprise plans. All pricing beyond the Academic tier requires contacting sales.
url: https://benchling.com/pricing
plans:
  - name: Academic
    description: Free plan for individual academics, university labs, and classroom use. Includes Electronic Lab Notebook and core molecular biology tools but excludes Registry and Inventory modules.
    price: 0
    currency: USD
    billing_cycle: annual
    features:
      - Electronic Lab Notebook (ELN)
      - Molecular Biology tools
      - CRISPR design tools
      - Primer design
      - Sequence alignments
      - Basic collaboration
    limitations:
      - No Registry module
      - No Inventory module
      - No API access

  - name: Professional
    description: Paid plan for growing biotech teams that need Registry and Inventory management plus API integration capabilities. Custom pricing requires a sales conversation.
    price: custom
    currency: USD
    billing_cycle: annual
    reported_starting_price: 15000
    reported_per_user_price: 1000
    features:
      - All Academic features
      - Registry module
      - Inventory module
      - REST API access
      - Python SDK
      - Webhooks / Events
      - Data Warehouse (SQL export)
      - Benchling Apps (developer platform)
    notes: >
      "Benchling for Startups" variant starts at approximately $15,000/year for a small team.
      Typical per-user cost ~$1,000/year. Professional services implementation adds $10,000–$20,000.

  - name: Enterprise
    description: Full-featured plan for large pharmaceutical and biotechnology organizations requiring advanced ecosystem connectivity, validation support, and comprehensive implementation services.
    price: custom
    currency: USD
    billing_cycle: annual
    features:
      - All Professional features
      - Advanced ecosystem connectivity
      - Enhanced data storage
      - 21 CFR Part 11 / GxP validation support
      - Customized solution accelerators
      - Dedicated customer success and implementation packages
      - Priority support
    notes: >
      Enterprise agreements can reach $1 million or more for very large organizations.
      Final cost depends on number of users, modules enabled, and implementation complexity.

contact_sales: https://benchling.com/contact
